<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>採用マイページ 入力テスト</title>
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      label {
        display: grid;
        gap: 4px;
        margin: 12px 0;
      }

      input,
      select,
      textarea {
        min-height: 36px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>採用マイページ 入力テスト</h1>
    <form>
      <label>氏名<input name="student_name"></label>
      <label>フリガナ<input name="student_kana"></label>
      <label>メールアドレス<input type="email" name="email"></label>
      <label>携帯電話<input type="tel" name="mobile_tel"></label>
      <label>郵便番号<input name="zip"></label>
      <label>都道府県<select name="prefecture">
        <option value=""></option>
        <option>東京都</option>
        <option>神奈川県</option>
        <option>大阪府</option>
      </select></label>
      <label>市区町村<input name="city"></label>
      <label>番地<input name="street"></label>
      <label>性別</label>
      <label><input type="radio" name="gender" value="男性">男性</label>
      <label><input type="radio" name="gender" value="女性">女性</label>
      <label>大学名<input name="university"></label>
      <label>学部<input name="faculty"></label>
      <label>自己PR<textarea name="pr"></textarea></label>
    </form>
  </body>
</html>
